<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>勇者與公主魔法：五大英雄奧義覺醒版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <style>
        /* 雲端存檔通知訊息樣式 */
        .cloud-notification {
            background: #2c3e50;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            animation: fadeInOut 2s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 32px; color: #ff1493; text-shadow: var(--fairy-glow); margin-bottom: 30px;">挑選你的勇者</h1>
    <div class="char-selector">
        <button class="nav-arrow" onclick="changeHeroSelection(-1)">◀</button>
        <div style="text-align: center;">
            <img id="selected-char-preview" src="">
            <div id="char-status-text">已準備就緒</div>
        </div>
        <button class="nav-arrow" onclick="changeHeroSelection(1)">▶</button>
    </div>
    <button id="central-start-btn" onclick="startGame()">點擊開始冒險 ✨</button>
</div>

<audio id="hero-atk-sfx"></audio>
<audio id="hero-atk2-sfx"></audio>
<audio id="hero-hurt-sfx"></audio>

<audio id="my-bgm" src="assets/music/bgm.mp3" loop></audio>
<audio id="win-bgm" src="assets/music/win.mp3" loop></audio>
<audio id="fail-bgm" src="assets/music/fail.mp3" loop></audio>

<audio id="sfx-hit" src=""></audio>
<audio id="sfx-hurt" src=""></audio>
<audio id="sfx-meteor" src=""></audio>
<audio id="sfx-magic-custom"></audio>

<div id="game-over-screen" style="background-image: url('assets/bg_fail.png');">
    <h1 style="font-size: 50px; color: #ff7675; text-shadow: 0 0 20px black;">💀 再接再厲！ 💀</h1>
    <button class="big-btn" onclick="restartFromFailure()">再次挑戰 ⚔️</button>
</div>

<div id="victory-screen" style="background-image: url('assets/bg_victory.png');">
    <h1 style="font-size: 40px; color: #ff1493; text-shadow: 0 0 10px white;">✨ 獲得新貼紙！ ✨</h1>
    <div id="new-sticker-display"></div>
    <button class="big-btn" onclick="location.reload()">回村莊</button>
</div>

<div id="sticker-detail-modal" class="modal-overlay" onclick="this.style.display='none'; document.getElementById('detail-video').pause();">
    <div class="modal-content" style="text-align:center;" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="document.getElementById('sticker-detail-modal').style.display='none'; document.getElementById('detail-video').pause();">✕</button>
        <img id="detail-img" src="" style="width:200px; height:200px; object-fit:contain; margin-bottom:15px;">
        <h2 id="detail-title" style="color:var(--text-purple); margin-bottom: 5px;"></h2>
        <p id="detail-desc" style="background:#fff0f5; padding:15px; border-radius:20px; text-align:left; line-height: 1.5; color: #555; white-space: pre-line; margin-top: 10px;"></p>
        
        <button id="play-video-btn" style="display:none; background: #ff69b4; color: white; border: 3px solid #ffb6c1; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size:16px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);">觀看介紹影片 🎬</button>
        
        <div id="video-container" style="display:none; margin-top: 15px;">
            <video id="detail-video" width="100%" controls style="border-radius: 15px; border: 4px solid #ffb6c1; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal-overlay" style="display:none; z-index:9000;">
    <div class="modal-content" style="text-align:center;">
        <button class="close-btn" onclick="toggleSettings(false)">X</button>
        <h2 style="color:#8e44ad; font-size:28px; margin-bottom:15px;">⚙️ 冒險設定</h2>
        
        <div style="margin:20px 0; font-weight:bold; color:#f06292;">
            <label>🎵 背景音樂 (BGM) <span id="bgm-vol-val">10%</span></label><br>
            <input type="range" id="bgm-vol" min="0" max="1" step="0.1" value="0.1" onchange="updateBgmVolume(this.value)" style="width:80%; margin-top:10px;">
        </div>
        <div style="margin:20px 0; font-weight:bold; color:#f06292;">
            <label>🔊 英文發音 (Voice) <span id="voice-vol-val">100%</span></label><br>
            <input type="range" id="voice-vol" min="0" max="1" step="0.1" value="1.0" onchange="updateVoiceVolume(this.value)" style="width:80%; margin-top:10px;">
        </div>
        
        <button id="bgm-toggle-settings" class="option-btn" style="width:100%; margin-bottom:20px; box-shadow:0 4px 0 #d1c4e9;" onclick="toggleMusic()">音樂：已暫停</button>
        
        <!-- 雲端存檔專區會由 cloudsave.js 動態注入 -->
        
        <div style="background:#f0f3f4; padding:15px; border-radius:15px; margin-bottom:20px; border:2px dashed #bdc3c7;">
            <div style="font-size:18px; color:#2c3e50; font-weight:bold; margin-bottom:10px;">🛡️ 家長管理專區</div>
            <button id="parent-locked-btn" class="option-btn" style="background:#bdc3c7; color:#2c3e50; border:none; width:100%; box-shadow:0 4px 0 #95a5a6;" onclick="unlockParentMode()">🔒 點擊解鎖</button>
            <div id="parent-unlocked-zone" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <button class="option-btn" style="background:#f39c12; color:white; border:none; width:100%; box-shadow:0 4px 0 #d35400;" onclick="parentAction('cheat')">✨ 開啟滿星測試</button>
                <button class="option-btn" style="background:#e74c3c; color:white; border:none; width:100%; box-shadow:0 4px 0 #c0392b;" onclick="parentAction('reset')">🗑️ 清除紀錄</button>
            </div>
            <div style="font-size: 12px; color: #888; text-align: center; margin-top: 10px;">
                💡 提示：使用「☁️ 雲端存檔」可以備份和還原進度
            </div>
        </div>

        <button class="big-btn" style="width:100%; margin-top:15px; font-size:22px; background:linear-gradient(180deg, #ff9a9e, #fecfef); color:#d63031; border:4px solid white;" onclick="quitToMain()">🚪 放棄並回首頁</button>
        <button class="big-btn" style="width:100%; margin-top:15px; font-size:22px; background:linear-gradient(180deg, #ffd700, #ff8c00); border:4px solid white;" onclick="toggleSettings(false); openLobby();">📔 前往大廳</button>
    </div>
</div>

<!-- 大廳功能彈窗 Modal -->
<div id="lobby-modal" class="modal-overlay" style="display:none; z-index: 9500;">
    <div class="modal-content" style="max-width: 95%; width: 500px; text-align: center; padding: 20px; max-height: 85vh; overflow-y: auto;">
        <button class="close-btn" onclick="closeLobbyModal()">X</button>
        <div id="lobby-modal-content"></div>
    </div>
</div>

<div id="game-container">
    <div id="level-tag">第一關</div>
    
    <div id="test-panel">
        <div style="font-size:12px; color:#f06292; font-weight:bold; margin-bottom:5px; text-align:center;">🔧 測試區 (免打字)</div>
        <button onclick="forceSkill(0)" style="background:#a29bfe; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; margin-right:2px;">招 1</button>
        <button onclick="forceSkill(1)" style="background:#a29bfe; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; margin-right:2px;">招 2</button>
        <button onclick="forceSkill(2)" style="background:#f06292; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; box-shadow: 0 0 5px #f06292;">招 3</button>
        <button onclick="forceSkill(3)" style="background:#ffd700; color:#d35400; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; margin-top:5px; width:100%; font-size:12px;">⭐ 招 4</button>
    </div>

    <div id="top-controls"><button id="settings-btn" onclick="toggleSettings(true)">⚙️</button></div>
    <h1>勇者與公主魔法</h1>
    <div id="battle-scene">
        <div id="battle-msg"></div>
        <img id="magic-meteor" src="assets/meteor.png" data-current-anim="">
        <div class="actor-group">
            <img id="hero-img" src="" class="character-img-hero">
            <div id="prince-hp" class="hp-hearts"></div>
        </div>
        <div class="actor-group">
            <img id="dragon-img" src="dragon1/dragon.png" class="character-img-dragon">
            <div id="dragon-hp" class="hp-hearts"></div>
        </div>
    </div>
    <div id="question-area">
        <div id="question-box"><img id="question-img" src=""></div>
        <button id="global-audio-btn" onclick="speakTargetWord()">🔊</button>
    </div>
    <div id="options-container"></div>
    <div id="spelling-container">
        <div id="word-display"></div>
        <div id="letters-grid"></div>
    </div>
</div>

<!-- 大廳按鈕區 (簡化版) -->
<div id="lobby-buttons" style="position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 100; border-radius: 30px; margin: 0 10px;">
    <button onclick="openLobbyModal('rules', '遊戲規則')" style="background: #fff9c4; border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: #d35400; font-size: 14px;">📜 規則</button>
    <button onclick="openLobbyModal('gacha', '轉蛋機')" style="background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: white; font-size: 14px;">🎁 轉蛋機</button>
    <button onclick="openLobbyModal('shop', '星塵商店')" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: white; font-size: 14px;">🏪 商店</button>
    <button onclick="openLobbyModal('collection', '貼紙圖鑑')" style="background: linear-gradient(135deg, #fd79a8, #e84393); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: white; font-size: 14px;">📚 圖鑑</button>
    <button onclick="openLobbyModal('wall', '展示牆')" style="background: linear-gradient(135deg, #74b9ff, #0984e3); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: white; font-size: 14px;">🖼️ 展示牆</button>
    <button onclick="openLobbyModal('lessons', '單字本')" style="background: linear-gradient(135deg, #00cec9, #00b894); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: white; font-size: 14px;">📖 單字本</button>
    <button onclick="openLobbyModal('report', '學習戰報')" style="background: linear-gradient(135deg, #dfe6e9, #b2bec3); border: none; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: #2d3436; font-size: 14px;">📊 戰報</button>
</div>

<!-- ========== 載入 JavaScript 檔案 ========== -->
<script src="data.js"></script>
<script src="effects.js"></script>
<script src="system.js"></script>
<script src="lobby.js"></script>
<script src="combat.js" defer></script>
<script src="cloudsave.js"></script>

</body>
</html>
