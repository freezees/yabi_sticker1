<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勇者與公主魔法：五大英雄奧義覺醒版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 32px; color: #ff1493; text-shadow: var(--fairy-glow); margin-bottom: 30px;">挑選你的勇者</h1>
    <div class="char-selector">
        <button class="nav-arrow" onclick="changeHeroSelection(-1)">◀</button>
        <div style="text-align: center;">
            <img id="selected-char-preview" src="">
            <div id="char-status-text">已準備就緒</div>
        </div>
        <button class="nav-arrow" onclick="changeHeroSelection(1)">▶</button>
    </div>
    <button id="central-start-btn" onclick="startGame()">點擊開始冒險 ✨</button>
</div>

<audio id="hero-atk-sfx"></audio>
<audio id="hero-atk2-sfx"></audio>
<audio id="hero-hurt-sfx"></audio>

<audio id="my-bgm" src="bgm.mp3" loop></audio>
<audio id="win-bgm" src="win.mp3" loop></audio>
<audio id="fail-bgm" src="fail.mp3" loop></audio>

<audio id="sfx-hit" src=""></audio>
<audio id="sfx-hurt" src=""></audio>
<audio id="sfx-meteor" src=""></audio>
<audio id="sfx-magic-custom"></audio>

<div id="game-over-screen" style="background-image: url('assets/bg_fail.png');">
    <h1 style="font-size: 50px; color: #ff7675; text-shadow: 0 0 20px black;">💀 再接再厲！ 💀</h1>
    <button class="big-btn" onclick="restartFromFailure()">再次挑戰 ⚔️</button>
</div>

<div id="victory-screen" style="background-image: url('assets/bg_victory.png');">
    <h1 style="font-size: 40px; color: #ff1493; text-shadow: 0 0 10px white;">✨ 獲得新貼紙！ ✨</h1>
    <div id="new-sticker-display"></div>
    <button class="big-btn" onclick="location.reload()">回村莊</button>
</div>

<div id="sticker-detail-modal" class="modal-overlay" onclick="this.style.display='none'; document.getElementById('detail-video').pause();">
    <div class="modal-content" style="text-align:center;" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="document.getElementById('sticker-detail-modal').style.display='none'; document.getElementById('detail-video').pause();">✕</button>
        <img id="detail-img" src="" style="width:200px; height:200px; object-fit:contain; margin-bottom:15px;">
        <h2 id="detail-title" style="color:var(--text-purple); margin-bottom: 5px;"></h2>
        <p id="detail-desc" style="background:#fff0f5; padding:15px; border-radius:20px; text-align:left; line-height: 1.5; color: #555; white-space: pre-line; margin-top: 10px;"></p>
        
        <button id="play-video-btn" style="display:none; background: #ff69b4; color: white; border: 3px solid #ffb6c1; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size:16px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);">觀看介紹影片 🎬</button>
        
        <div id="video-container" style="display:none; margin-top: 15px;">
            <video id="detail-video" width="100%" controls style="border-radius: 15px; border: 4px solid #ffb6c1; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>
</div>


<div id="game-container">
    <div id="level-tag">第一關</div>
    
    <div id="test-panel">
        <div style="font-size:12px; color:#f06292; font-weight:bold; margin-bottom:5px; text-align:center;">🔧 測試區 (免打字)</div>
        <button onclick="forceSkill(0)" style="background:#a29bfe; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; margin-right:2px;">招 1</button>
        <button onclick="forceSkill(1)" style="background:#a29bfe; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; margin-right:2px;">招 2</button>
        <button onclick="forceSkill(2)" style="background:#f06292; color:white; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; box-shadow: 0 0 5px #f06292;">招 3</button>
    </div>

    <div id="top-controls"><button id="settings-btn" onclick="toggleSettings(true)">⚙️</button></div>
    <h1>勇者與公主魔法</h1>
    <div id="battle-scene">
        <div id="battle-msg"></div>
        <img id="magic-meteor" src="assets/meteor.png" data-current-anim="">
        <div class="actor-group">
            <img id="hero-img" src="" class="character-img-hero">
            <div id="prince-hp" class="hp-hearts"></div>
        </div>
        <div class="actor-group">
            <img id="dragon-img" src="dragon1/dragon.png" class="character-img-dragon">
            <div id="dragon-hp" class="hp-hearts"></div>
        </div>
    </div>
    <div id="question-area">
        <div id="question-box"><img id="question-img" src=""></div>
        <button id="global-audio-btn" onclick="speakTargetWord()">🔊</button>
    </div>
    <div id="options-container"></div>
    <div id="spelling-container">
        <div id="word-display"></div>
        <div id="letters-grid"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="effects.js"></script>
<script src="system.js"></script>
<script src="lobby.js"></script>
<script src="combat.js"></script>
</body>
</html>
